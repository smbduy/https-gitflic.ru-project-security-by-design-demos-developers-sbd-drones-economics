# Hyperledger Fabric Network - Docker Compose
# Drone Fleet Management System

volumes:
  orderer.drone-network.local:
  peer0.aggregator.drone-network.local:
  peer0.operator.drone-network.local:
  peer0.insurer.drone-network.local:
  peer0.certcenter.drone-network.local:
  peer0.manufacturer.drone-network.local:
  # Добавить новые volumes
  peer0.orvd.drone-network.local:
  peer0.regulator.drone-network.local:

networks:
  drone-network:
    name: fabric_drone

services:
  # ============ ORDERER ============
  orderer.drone-network.local:
    container_name: orderer.drone-network.local
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/drone-network.local/orderers/orderer.drone-network.local/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/drone-network.local/orderers/orderer.drone-network.local/tls:/var/hyperledger/orderer/tls
      - orderer.drone-network.local:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
    networks:
      - drone-network

  # ============ AGGREGATOR PEER ============
  peer0.aggregator.drone-network.local:
    container_name: peer0.aggregator.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.aggregator.drone-network.local
      - CORE_PEER_ADDRESS=peer0.aggregator.drone-network.local:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.aggregator.drone-network.local:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.aggregator.drone-network.local:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.aggregator.drone-network.local:7051
      - CORE_PEER_LOCALMSPID=AggregatorMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.aggregator.drone-network.local:9444
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/aggregator.drone-network.local/peers/peer0.aggregator.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/aggregator.drone-network.local/peers/peer0.aggregator.drone-network.local/tls:/etc/hyperledger/fabric/tls
      - peer0.aggregator.drone-network.local:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
      - "9444:9444"
    networks:
      - drone-network

  # ============ OPERATOR PEER ============
  peer0.operator.drone-network.local:
    container_name: peer0.operator.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.operator.drone-network.local
      - CORE_PEER_ADDRESS=peer0.operator.drone-network.local:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.operator.drone-network.local:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.operator.drone-network.local:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.operator.drone-network.local:8051
      - CORE_PEER_LOCALMSPID=OperatorMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.operator.drone-network.local:9445
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/operator.drone-network.local/peers/peer0.operator.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/operator.drone-network.local/peers/peer0.operator.drone-network.local/tls:/etc/hyperledger/fabric/tls
      - peer0.operator.drone-network.local:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "8051:8051"
      - "9445:9445"
    networks:
      - drone-network

  # ============ INSURER PEER ============
  peer0.insurer.drone-network.local:
    container_name: peer0.insurer.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.insurer.drone-network.local
      - CORE_PEER_ADDRESS=peer0.insurer.drone-network.local:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.insurer.drone-network.local:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.insurer.drone-network.local:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.insurer.drone-network.local:9051
      - CORE_PEER_LOCALMSPID=InsurerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.insurer.drone-network.local:9446
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/insurer.drone-network.local/peers/peer0.insurer.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/insurer.drone-network.local/peers/peer0.insurer.drone-network.local/tls:/etc/hyperledger/fabric/tls
      - peer0.insurer.drone-network.local:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "9051:9051"
      - "9446:9446"
    networks:
      - drone-network

  # ============ CERTCENTER PEER ============
  peer0.certcenter.drone-network.local:
    container_name: peer0.certcenter.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.certcenter.drone-network.local
      - CORE_PEER_ADDRESS=peer0.certcenter.drone-network.local:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.certcenter.drone-network.local:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.certcenter.drone-network.local:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.certcenter.drone-network.local:10051
      - CORE_PEER_LOCALMSPID=CertCenterMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.certcenter.drone-network.local:9447
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/certcenter.drone-network.local/peers/peer0.certcenter.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/certcenter.drone-network.local/peers/peer0.certcenter.drone-network.local/tls:/etc/hyperledger/fabric/tls
      - peer0.certcenter.drone-network.local:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "10051:10051"
      - "9447:9447"
    networks:
      - drone-network

  # ============ MANUFACTURER PEER ============
  peer0.manufacturer.drone-network.local:
    container_name: peer0.manufacturer.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.manufacturer.drone-network.local
      - CORE_PEER_ADDRESS=peer0.manufacturer.drone-network.local:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.manufacturer.drone-network.local:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.manufacturer.drone-network.local:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.manufacturer.drone-network.local:11051
      - CORE_PEER_LOCALMSPID=ManufacturerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.manufacturer.drone-network.local:9448
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/manufacturer.drone-network.local/peers/peer0.manufacturer.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/manufacturer.drone-network.local/peers/peer0.manufacturer.drone-network.local/tls:/etc/hyperledger/fabric/tls
