    command: peer node start
    ports:
      - "11051:11051"
      - "9448:9448"
    networks:
      - drone-network

  # ============ НОВЫЕ ОРГАНИЗАЦИИ ============

  # ============ ORVD PEER ============
  peer0.orvd.drone-network.local:
    container_name: peer0.orvd.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.orvd.drone-network.local
      - CORE_PEER_ADDRESS=peer0.orvd.drone-network.local:12051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:12051
      - CORE_PEER_CHAINCODEADDRESS=peer0.orvd.drone-network.local:12052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:12052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.orvd.drone-network.local:12051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.orvd.drone-network.local:12051
      - CORE_PEER_LOCALMSPID=OrvdMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.orvd.drone-network.local:9449
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/orvd.drone-network.local/peers/peer0.orvd.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/orvd.drone-network.local/peers/peer0.orvd.drone-network.local/tls:/etc/hyperledger/fabric/tls
      - peer0.orvd.drone-network.local:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "12051:12051"
      - "9449:9449"
    networks:
      - drone-network

  # ============ REGULATOR PEER ============
  peer0.regulator.drone-network.local:
    container_name: peer0.regulator.drone-network.local
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_drone
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.regulator.drone-network.local
      - CORE_PEER_ADDRESS=peer0.regulator.drone-network.local:13051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:13051
      - CORE_PEER_CHAINCODEADDRESS=peer0.regulator.drone-network.local:13052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:13052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.regulator.drone-network.local:13051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.regulator.drone-network.local:13051
      - CORE_PEER_LOCALMSPID=RegulatorMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.regulator.drone-network.local:9450
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/regulator.drone-network.local/peers/peer0.regulator.drone-network.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/regulator.drone-network.local/peers/peer0.regulator.drone-network.local/tls:/etc/hyperledger/fabric/tls
      - peer0.regulator.drone-network.local:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "13051:13051"
      - "9450:9450"
    networks:
      - drone-network

  # ============ CLI ============
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.aggregator.drone-network.local:7051
      - CORE_PEER_LOCALMSPID=AggregatorMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/aggregator.drone-network.local/peers/peer0.aggregator.drone-network.local/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/aggregator.drone-network.local/peers/peer0.aggregator.drone-network.local/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/aggregator.drone-network.local/peers/peer0.aggregator.drone-network.local/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/aggregator.drone-network.local/users/Admin@aggregator.drone-network.local/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - orderer.drone-network.local
      - peer0.aggregator.drone-network.local
      - peer0.operator.drone-network.local
      - peer0.insurer.drone-network.local
      - peer0.certcenter.drone-network.local
      - peer0.manufacturer.drone-network.local
      # Добавить новые зависимости
      - peer0.orvd.drone-network.local
      - peer0.regulator.drone-network.local
    networks:
      - drone-network