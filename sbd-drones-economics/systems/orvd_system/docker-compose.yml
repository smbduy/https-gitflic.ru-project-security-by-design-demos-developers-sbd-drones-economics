# Docker Compose для orvd_system.
# Только сервисы компонентов. Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл НЕ используется напрямую — его собирает scripts/prepare_system.py.

services:
  orvd_component:
    build:
      context: ../..
      dockerfile: systems/orvd_system/src/orvd_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=orvd_component
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER_A:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD_A:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.orvd.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  orvd_gateway:
    build:
      context: ../..
      dockerfile: systems/orvd_system/src/gateway/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_ID=orvd_system
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=8084
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.orvd.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  orvd_journal:
    build:
      context: ../..
      dockerfile: sdk/journal_docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=orvd_journal
      - JOURNAL_TOPIC=components.orvd.journal
      - ANALYTICS_URL=${ANALYTICS_URL:-}
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY:-}
      - ANALYTICS_SERVICE_NAME=regulator
      - ANALYTICS_SERVICE_ID=1
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}