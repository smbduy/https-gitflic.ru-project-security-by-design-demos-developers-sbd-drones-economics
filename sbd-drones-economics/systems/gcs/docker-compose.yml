      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MISSION_STORE_REDIS_DB=0
      - DRONE_STORE_REDIS_DB=1
      - PYTHONUNBUFFERED=1
