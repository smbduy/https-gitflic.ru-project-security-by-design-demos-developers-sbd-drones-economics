      - BROKER_USER=${NAVIGATION_BROKER_USER:-${ADMIN_USER}}
      - BROKER_PASSWORD=${NAVIGATION_BROKER_PASSWORD:-${ADMIN_PASSWORD}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks: [drones_net]
    restart: unless-stopped

