# Delivery drone system. Component services only; broker is merged by scripts/prepare_system.py.

services:
  security_monitor:
    build:
      context: ../..
      dockerfile: systems/deliverydron/src/security_monitor/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - TOPIC_VERSION=${TOPIC_VERSION:-v1}
      - INSTANCE_ID=${INSTANCE_ID:-Delivery001}
      - SYSTEM_NAME=${SECURITY_MONITOR_SYSTEM_NAME:-deliverydron}
      - COMPONENT_ID=${SECURITY_MONITOR_COMPONENT_ID:-security_monitor}
      - COMPONENT_TOPIC=${SECURITY_MONITOR_COMPONENT_TOPIC:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${SECURITY_MONITOR_BROKER_USER:-${ADMIN_USER}}
      - BROKER_PASSWORD=${SECURITY_MONITOR_BROKER_PASSWORD:-${ADMIN_PASSWORD}}
      - SECURITY_POLICIES=${SECURITY_MONITOR_SECURITY_POLICIES:-}
      - SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S=${SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S:-10.0}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks: [drones_net]
    restart: unless-stopped

  journal:
    build:
      context: ../..
      dockerfile: systems/deliverydron/src/journal/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - TOPIC_VERSION=${TOPIC_VERSION:-v1}
      - INSTANCE_ID=${INSTANCE_ID:-Delivery001}
      - SYSTEM_NAME=${JOURNAL_SYSTEM_NAME:-deliverydron}
      - COMPONENT_ID=${JOURNAL_COMPONENT_ID:-journal}
      - COMPONENT_TOPIC=${JOURNAL_COMPONENT_TOPIC:-}
      - JOURNAL_FILE_PATH=${JOURNAL_FILE_PATH:-/data/deliverydron_journal.ndjson}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${JOURNAL_BROKER_USER:-${ADMIN_USER}}
      - BROKER_PASSWORD=${JOURNAL_BROKER_PASSWORD:-${ADMIN_PASSWORD}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - journal_data:/data
    networks: [drones_net]
    restart: unless-stopped

  navigation:
