services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sitl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sitl-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sitl-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: sitl-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  sitl_verifier:
    build:
      context: .
      dockerfile: components/sitl_verifier/docker/Dockerfile
    image: sitl-module-verifier:latest
    container_name: sitl-verifier
    entrypoint: [""]
    command: ["sh", "-c", "pip install --timeout 60 --retries 3 -i https://pypi.tuna.tsinghua.edu.cn/simple -q -r requirements.txt 2>/dev/null; python -u -m components.sitl_verifier"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      INPUT_TOPICS: ${INPUT_TOPICS:-sitl.commands,sitl-drone-home}
      COMMAND_TOPIC: ${COMMAND_TOPIC:-sitl.commands}
      HOME_TOPIC: ${HOME_TOPIC:-sitl-drone-home}
      VERIFIED_COMMAND_TOPIC: ${VERIFIED_COMMAND_TOPIC:-sitl.verified-commands}
      VERIFIED_HOME_TOPIC: ${VERIFIED_HOME_TOPIC:-sitl.verified-home}
      COMPONENT_ID: sitl-verifier
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

  sitl_controller:
    image: sitl-module-controller:latest
    container_name: sitl-controller
    entrypoint: [""]
    command: ["sh", "-c", "pip install --timeout 60 --retries 3 -i https://pypi.tuna.tsinghua.edu.cn/simple -q -r requirements.txt 2>/dev/null; python -u -m components.sitl_controller"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      VERIFIED_COMMAND_TOPIC: ${VERIFIED_COMMAND_TOPIC:-sitl.verified-commands}
      VERIFIED_HOME_TOPIC: ${VERIFIED_HOME_TOPIC:-sitl.verified-home}
      STATE_TTL_SEC: ${STATE_TTL_SEC:-7200}
      COMPONENT_ID: sitl-controller
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

  sitl_core:
    image: sitl-module-core:latest
    container_name: sitl-core
    entrypoint: [""]
    command: ["sh", "-c", "pip install --timeout 60 --retries 3 -i https://pypi.tuna.tsinghua.edu.cn/simple -q -r requirements.txt 2>/dev/null; python -u -m components.sitl_core"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      UPDATE_FREQUENCY_HZ: ${UPDATE_FREQUENCY_HZ:-10.0}
      STATE_TTL_SEC: ${STATE_TTL_SEC:-7200}
      COMPONENT_ID: sitl-core
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

  sitl_messaging:
    image: sitl-module-messaging:latest
    container_name: sitl-messaging
    entrypoint: [""]
    command: ["sh", "-c", "pip install --timeout 60 --retries 3 -i https://pypi.tuna.tsinghua.edu.cn/simple -q -r requirements.txt 2>/dev/null; python -u -m components.sitl_messaging"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      POSITION_REQUEST_TOPIC: ${POSITION_REQUEST_TOPIC:-sitl.telemetry.request}
      POSITION_RESPONSE_TOPIC: ${POSITION_RESPONSE_TOPIC:-sitl.telemetry.response}
      COMPONENT_ID: sitl-messaging
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

networks:
  default:
    name: sitl-network

volumes:
  redis_data:
