# Docker Compose для alt_insurer.
# Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл собирает scripts/prepare_system.py.

services:
  insurer_service:
    build:
      context: ../..
      dockerfile: systems/alt_insurer/src/insurance_service/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=insurer_service
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER_INSURER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD_INSURER:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.alt_insurer.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  insurer_gateway:
    build:
      context: ../..
      dockerfile: systems/alt_insurer/src/gateway/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_ID=alt_insurer
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=8081
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.alt_insurer.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  insurer_journal:
    build:
      context: ../..
      dockerfile: sdk/journal_docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=insurer_journal
      - JOURNAL_TOPIC=components.alt_insurer.journal
      - ANALYTICS_URL=${ANALYTICS_URL:-}
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY:-}
      - ANALYTICS_SERVICE_NAME=alt_insurer
      - ANALYTICS_SERVICE_ID=20
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
