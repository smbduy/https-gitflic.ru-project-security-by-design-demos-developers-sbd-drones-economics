# Docker Compose для DummySystem.
# Только сервисы компонентов. Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл НЕ используется напрямую — его собирает scripts/prepare_system.py.

services:
  dummy_component_a:
    build:
      context: ../..
      dockerfile: systems/dummy_system/src/dummy_component_a/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=dummy_component_a
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER_A:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD_A:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.dummy_system.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  dummy_component_b:
    build:
      context: ../..
      dockerfile: systems/dummy_system/src/dummy_component_b/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=dummy_component_b
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER_B:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD_B:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.dummy_system.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  dummy_gateway:
    build:
      context: ../..
      dockerfile: systems/dummy_system/src/gateway/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_ID=dummy_system
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=8080
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.dummy_system.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  dummy_journal:
    build:
      context: ../..
      dockerfile: sdk/journal_docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=dummy_journal
      - JOURNAL_TOPIC=components.dummy_system.journal
      - ANALYTICS_URL=${ANALYTICS_URL:-}
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY:-}
      - ANALYTICS_SERVICE_NAME=dummy_system
      - ANALYTICS_SERVICE_ID=1
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
